# Основной файл конфигурации для Config Editor
# ============================================

server:
  # Порт, на котором будет работать веб-сервер
  port: 5000
  # Хост для прослушивания. 0.0.0.0 - все интерфейсы, 127.0.0.1 - только локальный
  host: "0.0.0.0"
  # Настройки фильтрации IP-адресов
  ip_filter:
    enabled: false
    # whitelist: Разрешены только эти IP. Если не пусто, blacklist игнорируется.
    whitelist:
      # - "192.168.1.100"
      # - "10.0.0.0/8"
    # blacklist: Запрещены эти IP.
    blacklist:
      # - "8.8.8.8"

security:
  # Секретный ключ для подписи сессий Flask.
  # ВНИМАНИЕ: При первом запуске будет сгенерирован и вставлен сюда новый ключ.
  secret_key: ""
  # Соль для хеширования пароля.
  # ВНИМАНИЕ: Генерируется и вставляется при первом запуске.
  password_hash_salt: ""
  # Хеш пароля администратора.
  # ВНИМАНИЕ: Устанавливается при первом запуске.
  admin_password_hash: ""
  # Флаг, указывающий, был ли уже выполнен первый запуск и смена пароля.
  # Не изменять вручную.
  initial_setup_complete: false
  # Имя пользователя для входа в систему.
  # В будущем может быть расширено до списка пользователей.
  admin_username: "admin"

app_settings:
  # Абсолютный путь к директории, файлы конфигурации в которой будут доступны для редактирования.
  # Пример: "/etc/"
  # Оставьте пустым, чтобы указать при первом запуске через веб-интерфейс.
  managed_configs_dir: "/etc/example_configs/"
  # Путь для хранения резервных копий
  backups_dir: "data/backups/"
  # Поддерживаемые расширения файлов. Парсеры будут искаться для этих типов.
  supported_extensions:
    - ".ini"
    - ".conf"
    - ".cfg"
    - ".config"
    - ".xml"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".toml"
    - ".properties"
    - ".env"